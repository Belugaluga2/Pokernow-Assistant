<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokerNow Ledger</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    line-height: 1.5;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

  h1 {
    font-size: 2rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 0.25rem;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center;
    color: #64748b;
    margin-bottom: 2rem;
    font-size: 0.9rem;
  }

  /* Input Section */
  .input-section {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .input-section input {
    flex: 1;
    padding: 0.75rem 1rem;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-section input:focus { border-color: #22c55e; }
  .input-section input::placeholder { color: #475569; }

  .btn {
    padding: 0.75rem 1.5rem;
    background: #16a34a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }

  .btn:hover { background: #15803d; }
  .btn:disabled { background: #334155; cursor: not-allowed; }

  /* Status */
  .status {
    text-align: center;
    padding: 2rem;
    color: #94a3b8;
    display: none;
  }

  .status.visible { display: block; }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #334155;
    border-top-color: #22c55e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error { color: #ef4444; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
    border-bottom: 2px solid #1e293b;
  }

  .tab {
    padding: 0.6rem 1.5rem;
    background: none;
    border: none;
    color: #64748b;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.2s, border-color 0.2s;
  }

  .tab:hover { color: #94a3b8; }
  .tab.active { color: #22c55e; border-bottom-color: #22c55e; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Results */
  .results { display: none; }
  .results.visible { display: block; }

  .card {
    background: #1e293b;
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
    border: 1px solid #2d3a4f;
  }

  .card h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    color: #cbd5e1;
  }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    text-align: left;
    padding: 0.5rem 0.75rem;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #64748b;
    border-bottom: 1px solid #334155;
  }

  td {
    padding: 0.6rem 0.75rem;
    font-size: 0.9rem;
    border-bottom: 1px solid #1a2332;
  }

  tr:last-child td { border-bottom: none; }

  .num { text-align: right; font-variant-numeric: tabular-nums; font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; }
  .positive { color: #22c55e; }
  .negative { color: #ef4444; }
  .neutral { color: #94a3b8; }

  /* Settlements */
  .settlement {
    display: flex;
    align-items: center;
    padding: 0.6rem 0;
    border-bottom: 1px solid #1a2332;
    gap: 0.75rem;
    font-size: 0.9rem;
  }

  .settlement:last-child { border-bottom: none; }

  .settlement .from { color: #ef4444; font-weight: 600; min-width: 100px; text-align: right; }
  .settlement .arrow { color: #475569; }
  .settlement .amount {
    color: #facc15;
    font-weight: 700;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }
  .settlement .to { color: #22c55e; font-weight: 600; }

  /* Game Info */
  .game-info {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
  }

  .game-info .stat {
    display: flex;
    flex-direction: column;
  }

  .game-info .stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #64748b;
  }

  .game-info .stat-value {
    font-size: 1.15rem;
    font-weight: 700;
    color: #e2e8f0;
  }

  /* VPIP bar */
  .vpip-bar-container {
    width: 100%;
    height: 6px;
    background: #0f1117;
    border-radius: 3px;
    overflow: hidden;
  }

  .vpip-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .vpip-tight { background: #3b82f6; }
  .vpip-normal { background: #22c55e; }
  .vpip-loose { background: #f59e0b; }
  .vpip-very-loose { background: #ef4444; }

  /* Responsive */
  @media (max-width: 600px) {
    .input-section { flex-direction: column; }
    .container { padding: 1rem; }
    h1 { font-size: 1.5rem; }
    th, td { padding: 0.4rem; font-size: 0.8rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>PokerNow Ledger</h1>
  <p class="subtitle">Paste a PokerNow game link to generate the ledger and player statistics</p>

  <div class="input-section">
    <input type="text" id="gameUrl" placeholder="https://www.pokernow.com/games/..." />
    <button class="btn" id="analyzeBtn" onclick="analyze()">Analyze</button>
  </div>

  <div class="status" id="status">
    <div class="spinner"></div>
    <div id="statusText">Fetching game data...</div>
  </div>

  <div class="results" id="results">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('ledger', this)">Ledger</button>
      <button class="tab" onclick="switchTab('stats', this)">Statistics</button>
    </div>

    <div class="tab-content active" id="tab-ledger">
      <div class="card">
        <h2>Game Summary</h2>
        <div class="game-info" id="gameInfo"></div>
      </div>
      <div class="card">
        <h2>Player Results</h2>
        <table>
          <thead>
            <tr>
              <th>Player</th>
              <th class="num">Buy-in</th>
              <th class="num">Cash-out</th>
              <th class="num">Net</th>
            </tr>
          </thead>
          <tbody id="ledgerBody"></tbody>
        </table>
      </div>
      <div class="card">
        <h2>Settlements</h2>
        <div id="settlements"></div>
      </div>
    </div>

    <div class="tab-content" id="tab-stats">
      <div class="card">
        <h2>Player Statistics</h2>
        <table>
          <thead>
            <tr>
              <th>Player</th>
              <th class="num">Hands</th>
              <th class="num">VPIP</th>
              <th class="num">PFR</th>
              <th style="width: 20%">VPIP Range</th>
            </tr>
          </thead>
          <tbody id="statsBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// ===== CORS HANDLING =====
const CORS_PROXIES = [
  url => url,
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

function extractGameId(input) {
  input = input.trim();
  const m = input.match(/pokernow\.com\/games\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  if (/^[a-zA-Z0-9_-]+$/.test(input)) return input;
  return null;
}

async function fetchJSON(url) {
  for (const proxyFn of CORS_PROXIES) {
    try {
      const res = await fetch(proxyFn(url));
      if (!res.ok) continue;
      const text = await res.text();
      return JSON.parse(text);
    } catch (e) {
      continue;
    }
  }
  throw new Error('Could not fetch game data. The game may be private, or CORS is blocking the request.');
}

// ===== DATA FETCHING =====
async function fetchAllLogs(gameId, onProgress) {
  const allLogs = [];
  let beforeAt = null;
  let page = 0;

  while (true) {
    const url = `https://www.pokernow.com/games/${gameId}/log` +
                (beforeAt ? `?before_at=${beforeAt}` : '');
    const data = await fetchJSON(url);

    if (!data.logs || data.logs.length === 0) break;

    allLogs.push(...data.logs);
    beforeAt = data.logs[data.logs.length - 1].created_at;
    page++;
    if (onProgress) onProgress(allLogs.length, page);

    await new Promise(r => setTimeout(r, 80));
  }

  allLogs.reverse();
  return allLogs;
}

// ===== LOG PARSING =====
function parseLogs(logs) {
  const players = {};
  const hands = [];
  let currentHand = null;

  function getPlayer(name, id) {
    if (!players[id]) {
      players[id] = {
        name, id,
        buyins: [],
        cashouts: [],
        lastStack: 0,
        isActive: false,
      };
    }
    players[id].name = name;
    return players[id];
  }

  for (const log of logs) {
    const msg = log.msg;

    // Player joined
    let m = msg.match(/The player "(.+?) @ (.+?)" (?:joined|re-joined) the game with a stack of ([\d.]+)/);
    if (m) {
      const p = getPlayer(m[1], m[2]);
      p.buyins.push(parseFloat(m[3]));
      p.isActive = true;
      continue;
    }

    // Player quits
    m = msg.match(/The player "(.+?) @ (.+?)" quits the game with a stack of ([\d.]+)/);
    if (m) {
      const p = getPlayer(m[1], m[2]);
      p.cashouts.push(parseFloat(m[3]));
      p.isActive = false;
      continue;
    }

    // Admin stack update (rebuy/top-up)
    m = msg.match(/The admin updated the player "(.+?) @ (.+?)" stack from ([\d.]+) to ([\d.]+)/);
    if (m) {
      const p = getPlayer(m[1], m[2]);
      const diff = parseFloat(m[4]) - parseFloat(m[3]);
      if (diff > 0) p.buyins.push(diff);
      if (diff < 0) p.cashouts.push(Math.abs(diff));
      continue;
    }

    // Hand start
    m = msg.match(/-- starting hand #(\d+)/);
    if (m) {
      currentHand = {
        number: parseInt(m[1]),
        players: [],
        blindPlayers: new Set(),
        vpipPlayers: new Set(),
        pfrPlayers: new Set(),
        isPreflop: true,
      };
      hands.push(currentHand);
      continue;
    }

    // Hand end
    if (/-- ending hand #\d+/.test(msg)) {
      currentHand = null;
      continue;
    }

    if (!currentHand) continue;

    // Player stacks at hand start
    if (/^Player stacks:/.test(msg)) {
      const re = /"(.+?) @ (.+?)" \(([\d.]+)\)/g;
      let pm;
      while ((pm = re.exec(msg)) !== null) {
        const p = getPlayer(pm[1], pm[2]);
        p.lastStack = parseFloat(pm[3]);
        p.isActive = true;
        currentHand.players.push(pm[2]);
      }
      continue;
    }

    // Blind posts (small, big, missed, straddle)
    m = msg.match(/"(.+?) @ (.+?)" posts a .+blind of ([\d.]+)/);
    if (m && currentHand.isPreflop) {
      currentHand.blindPlayers.add(m[2]);
      continue;
    }

    // Flop ends preflop
    if (/^Flop:/.test(msg) || /^Flop \(/.test(msg)) {
      currentHand.isPreflop = false;
      continue;
    }

    // Preflop actions only
    if (!currentHand.isPreflop) continue;

    // Raises (including all-in raises)
    m = msg.match(/"(.+?) @ (.+?)" raises to ([\d.]+)/);
    if (m) {
      currentHand.vpipPlayers.add(m[2]);
      currentHand.pfrPlayers.add(m[2]);
      continue;
    }

    // Calls (including all-in calls)
    m = msg.match(/"(.+?) @ (.+?)" calls ([\d.]+)/);
    if (m) {
      currentHand.vpipPlayers.add(m[2]);
      continue;
    }

    // Bets (rare preflop, but possible in some variants)
    m = msg.match(/"(.+?) @ (.+?)" bets ([\d.]+)/);
    if (m) {
      currentHand.vpipPlayers.add(m[2]);
      currentHand.pfrPlayers.add(m[2]);
      continue;
    }
  }

  return { players, hands };
}

// ===== LEDGER CALCULATION =====
function calculateLedger(players) {
  const results = [];

  for (const id in players) {
    const p = players[id];
    const totalBuyin = p.buyins.reduce((a, b) => a + b, 0);
    const totalCashout = p.cashouts.reduce((a, b) => a + b, 0) +
                         (p.isActive ? p.lastStack : 0);
    const net = round2(totalCashout - totalBuyin);

    if (totalBuyin === 0 && totalCashout === 0) continue;

    results.push({
      name: p.name,
      id: p.id,
      buyin: round2(totalBuyin),
      cashout: round2(totalCashout),
      net,
    });
  }

  results.sort((a, b) => b.net - a.net);
  return results;
}

function calculateSettlements(ledger) {
  const debtors = ledger.filter(p => p.net < -0.005).map(p => ({ ...p, remaining: Math.abs(p.net) }));
  const creditors = ledger.filter(p => p.net > 0.005).map(p => ({ ...p, remaining: p.net }));

  debtors.sort((a, b) => b.remaining - a.remaining);
  creditors.sort((a, b) => b.remaining - a.remaining);

  const settlements = [];
  let i = 0, j = 0;

  while (i < debtors.length && j < creditors.length) {
    const amount = Math.min(debtors[i].remaining, creditors[j].remaining);
    if (amount > 0.005) {
      settlements.push({
        from: debtors[i].name,
        to: creditors[j].name,
        amount: round2(amount),
      });
    }
    debtors[i].remaining -= amount;
    creditors[j].remaining -= amount;
    if (debtors[i].remaining < 0.01) i++;
    if (creditors[j].remaining < 0.01) j++;
  }

  return settlements;
}

// ===== STATS CALCULATION =====
function calculateStats(players, hands) {
  const stats = {};

  for (const id in players) {
    stats[id] = { name: players[id].name, handsPlayed: 0, vpipHands: 0, pfrHands: 0 };
  }

  for (const hand of hands) {
    for (const id of hand.players) {
      if (!stats[id]) continue;
      stats[id].handsPlayed++;
      if (hand.vpipPlayers.has(id)) stats[id].vpipHands++;
      if (hand.pfrPlayers.has(id)) stats[id].pfrHands++;
    }
  }

  return Object.values(stats)
    .filter(s => s.handsPlayed > 0)
    .map(s => ({
      name: s.name,
      handsPlayed: s.handsPlayed,
      vpip: round1(s.vpipHands / s.handsPlayed * 100),
      pfr: round1(s.pfrHands / s.handsPlayed * 100),
      vpipHands: s.vpipHands,
      pfrHands: s.pfrHands,
    }))
    .sort((a, b) => b.handsPlayed - a.handsPlayed);
}

// ===== RENDERING =====
function renderResults(ledger, settlements, stats, handCount) {
  const totalPot = ledger.reduce((s, p) => s + p.buyin, 0);
  document.getElementById('gameInfo').innerHTML = `
    <div class="stat"><span class="stat-label">Players</span><span class="stat-value">${ledger.length}</span></div>
    <div class="stat"><span class="stat-label">Hands</span><span class="stat-value">${handCount}</span></div>
    <div class="stat"><span class="stat-label">Total Buy-ins</span><span class="stat-value">$${round2(totalPot).toFixed(2)}</span></div>
    <div class="stat"><span class="stat-label">Settlements</span><span class="stat-value">${settlements.length}</span></div>
  `;

  document.getElementById('ledgerBody').innerHTML = ledger.map(p => `
    <tr>
      <td>${esc(p.name)}</td>
      <td class="num">$${p.buyin.toFixed(2)}</td>
      <td class="num">$${p.cashout.toFixed(2)}</td>
      <td class="num ${p.net > 0.005 ? 'positive' : p.net < -0.005 ? 'negative' : 'neutral'}">
        ${p.net > 0 ? '+' : ''}$${p.net.toFixed(2)}
      </td>
    </tr>
  `).join('');

  if (settlements.length === 0) {
    document.getElementById('settlements').innerHTML = '<p style="color:#64748b">No settlements needed.</p>';
  } else {
    document.getElementById('settlements').innerHTML = settlements.map(s => `
      <div class="settlement">
        <span class="from">${esc(s.from)}</span>
        <span class="arrow">&#x2192;</span>
        <span class="amount">$${s.amount.toFixed(2)}</span>
        <span class="arrow">&#x2192;</span>
        <span class="to">${esc(s.to)}</span>
      </div>
    `).join('');
  }

  document.getElementById('statsBody').innerHTML = stats.map(s => {
    const barClass = s.vpip < 20 ? 'vpip-tight' : s.vpip < 30 ? 'vpip-normal' : s.vpip < 45 ? 'vpip-loose' : 'vpip-very-loose';
    return `
      <tr>
        <td>${esc(s.name)}</td>
        <td class="num">${s.handsPlayed}</td>
        <td class="num">${s.vpip.toFixed(1)}%</td>
        <td class="num">${s.pfr.toFixed(1)}%</td>
        <td>
          <div class="vpip-bar-container">
            <div class="vpip-bar ${barClass}" style="width: ${Math.min(s.vpip, 100)}%"></div>
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

// ===== UI =====
function showStatus(text, isError) {
  const el = document.getElementById('status');
  const textEl = document.getElementById('statusText');
  el.classList.add('visible');
  el.querySelector('.spinner').style.display = isError ? 'none' : 'block';
  textEl.className = isError ? 'error' : '';
  textEl.textContent = text;
}

function hideStatus() {
  document.getElementById('status').classList.remove('visible');
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

async function analyze() {
  const input = document.getElementById('gameUrl').value;
  const gameId = extractGameId(input);

  if (!gameId) {
    showStatus('Please enter a valid PokerNow game URL or game ID.', true);
    return;
  }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('results').classList.remove('visible');
  showStatus('Fetching game data...');

  try {
    const logs = await fetchAllLogs(gameId, (count, pages) => {
      showStatus(`Fetching game data... ${count} entries (page ${pages})`);
    });

    if (logs.length === 0) {
      showStatus('No game data found. The game may be empty or the link may be incorrect.', true);
      btn.disabled = false;
      return;
    }

    showStatus(`Parsing ${logs.length} log entries...`);

    const { players, hands } = parseLogs(logs);
    const ledger = calculateLedger(players);
    const settlements = calculateSettlements(ledger);
    const stats = calculateStats(players, hands);

    renderResults(ledger, settlements, stats, hands.length);

    hideStatus();
    document.getElementById('results').classList.add('visible');
  } catch (err) {
    showStatus(err.message, true);
  }

  btn.disabled = false;
}

document.getElementById('gameUrl').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});

// ===== UTILS =====
function round2(n) { return Math.round(n * 100) / 100; }
function round1(n) { return Math.round(n * 10) / 10; }
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
